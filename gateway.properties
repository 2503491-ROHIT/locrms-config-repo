server.port=9090

# Spring Cloud Gateway Routing Configurations
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=customer-service
spring.cloud.gateway.routes[1].uri=lb://customer-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/customers/**

spring.cloud.gateway.routes[2].id=repayment-service
spring.cloud.gateway.routes[2].uri=lb://repayment-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/loan/disbursement/**,/loan/repayment/**

spring.cloud.gateway.routes[3].id=loan-service
spring.cloud.gateway.routes[3].uri=lb://loan-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/loan/**

spring.cloud.gateway.routes[4].id=credit-service
spring.cloud.gateway.routes[4].uri=lb://credit-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/credit/**

spring.cloud.gateway.routes[5].id=collection-service
spring.cloud.gateway.routes[5].uri=lb://collection-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/collections/**

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# CORS configuration - Allowed Origins (comma-separated)
cors.allowed-origins=http://localhost:3000,http://localhost:8080,http://127.0.0.1:3000,http://127.0.0.1:8080

# CORS Allowed Methods
cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS

# CORS Allowed Headers
cors.allowed-headers=*

# CORS Exposed Headers
cors.exposed-headers=Content-Type,Authorization

# CORS Max Age (in seconds)
cors.max-age=3600

# Allow Credentials
cors.allow-credentials=true

# JWT Verification Secret (must match auth-service)
jwt.secret=9a4f2c8d3b7a1e5f8c6d3b7a1e5f8c6d3b7a1e5f8c6d3b7a1e5f8c6d3b7a1e5f
